<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청원고 '문학' 중간고사 대비</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --border: #e5eaf2;
      --text: #111827;
      --muted: #6b7280;
      --primary: #1f3a8a;
      --primary-soft: #eef3ff;
      --concept-soft: #f8f9fc;
      --quiz-soft: #f7faf8;
      --exam-soft: #f8f8fb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 44px 24px 60px;
    }

    .section {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 26px;
      padding: 28px;
      margin-top: 18px;
    }

    .section-title {
      font-size: 28px;
      font-weight: 800;
    }

    .section-sub {
      font-size: 15px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid-2 {
      grid-template-columns: 1fr 1fr;
    }

    .card {
      display: flex;
      justify-content: space-between;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
    }

    /* 🔥 중요표시 */
    .ribbon {
      position: absolute;
      top: 14px;
      right: 14px;
      background: #ef4444;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- 핵심 문학개념 -->
    <section class="section" style="position: relative;">
      <div class="ribbon">★ 필수</div>

      <div class="section-title">핵심 문학개념 자료</div>
      <div class="section-sub">시험범위 기준 핵심 정리</div>

      <div class="grid grid-2">
        <a class="card" href="cw_korean_definition.html">
          문학개념 정리 자료 ›
        </a>

        <a class="card" href="cw_korean_definition_Q.html">
          개념어 테스트 25문제 ›
        </a>
      </div>
    </section>

  </div>
</body>
</html>
