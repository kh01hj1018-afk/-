<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청원고 중간고사 대비</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --border: #e5eaf2;
      --text: #111827;
      --muted: #6b7280;
      --primary: #1f3a8a;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 46px;
      font-weight: 800;
      margin: 0;
    }

    .hero h1 .accent {
      color: var(--primary);
    }

    .hero-subtitle {
      margin-top: 10px;
      font-size: 20px;
      color: var(--muted);
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-top: 20px;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 26px;
      font-weight: 800;
    }

    .section-sub {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .grid-2 {
      grid-template-columns: 1fr 1fr;
    }

    .grid-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    /* 🔥 여기만 추가된 아이콘 스타일 */
    .concept-icons {
      display: flex;
      gap: 12px;
      margin: 14px 0;
    }

    .concept-item {
      flex: 1;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }

    .concept-icon {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .concept-text {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .grid-2, .grid-3 {
        grid-template-columns: 1fr;
      }

      .concept-icons {
        flex-direction: column;
      }
    }
  </style>
</head>

</html>
